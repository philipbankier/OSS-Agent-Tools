name: TasteKit Pre-release Live Smoke

on:
  workflow_dispatch:

jobs:
  live-ollama-smoke:
    runs-on: self-hosted
    timeout-minutes: 45
    defaults:
      run:
        working-directory: TasteKit/tastekit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: TasteKit/tastekit/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace
        run: pnpm -r build

      - name: Run live Ollama pre-release smoke
        run: bash scripts/validation/pre-release-live-ollama.sh
